<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body class="flex min-h-full flex-col bg-stone-50 text-stone-900 antialiased">
  <header class="sticky top-0 z-10 border-b border-stone-200/80 bg-white/90 shadow-sm backdrop-blur">
      <div class="mx-auto flex max-w-4xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
      <a class="text-lg font-semibold tracking-tight text-stone-900 transition-colors hover:text-indigo-600" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      {% if site.download_mac_url %}
      <a href="{{ site.download_mac_url }}" class="inline-flex shrink-0 items-center justify-center rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600" download rel="noopener noreferrer">Download Mac app</a>
      {% endif %}
    </div>
  </header>
  <main class="mx-auto w-full max-w-4xl flex-1 px-4 py-10 sm:px-6">
    <article class="prose prose-stone max-w-none prose-headings:font-semibold prose-headings:tracking-tight prose-a:text-indigo-600 prose-a:no-underline hover:prose-a:underline lg:prose-lg">
      {{ content }}
    </article>
  </main>
  <footer class="mt-auto border-t border-stone-200 bg-white/80">
      <div class="mx-auto max-w-4xl px-4 py-6 text-sm text-stone-500 sm:px-6">
      <p class="m-0">59 Projects</p>
    </div>
  </footer>
</body>
</html>
