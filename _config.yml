title: Studio
description: A space for process and learning, shared context for small teams
url: "https://studio.59projects.com"
baseurl: ""

markdown: kramdown
permalink: pretty

# Download: GitHub’s /releases/latest URL always opens the newest release (installers
# attached there). Change this only if you mirror downloads elsewhere.
download_page_url: "https://github.com/59-Projects/studio/releases/latest"
studio_repo_url: "https://github.com/59-Projects/studio"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - yarn.lock
  - node_modules
  - tailwind.config.js
  - postcss.config.js
  - src
  - .ruby-version
