title: Studio
description: A space for process and learning, shared context for small teams
url: "https://studio.59projects.com"
baseurl: ""

markdown: kramdown
permalink: pretty

# Direct Mac download: GitHub serves the file when the latest release contains an asset
# with this exact filename (see Studio package.json build.mac.artifactName).
download_mac_url: "https://github.com/59-Projects/studio/releases/latest/download/Studio-mac.dmg"

# Releases page for version history and changelog (optional link). Source repo for code.
releases_page_url: "https://github.com/59-Projects/studio/releases/latest"
studio_repo_url: "https://github.com/59-Projects/studio"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - yarn.lock
  - node_modules
  - tailwind.config.js
  - postcss.config.js
  - src
  - .ruby-version
