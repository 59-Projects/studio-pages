title: Studio
description: Project intelligence for small teams. A Mac app that gives everyone on your team a shared, AI-aware workspace built on git.
url: "https://studio.59projects.com"
baseurl: ""

markdown: kramdown
permalink: pretty

# Direct Mac DMG URL. Installers MUST live on PUBLIC GitHub Releases: anonymous visitors
# cannot download assets from Releases on private repos like 59-Projects/studio.
# Attach Studio-mac.dmg to a Release here (usually same semver tag as the app).
download_mac_url: "https://github.com/59-Projects/studio-pages/releases/latest/download/Studio-mac.dmg"

releases_page_url: "https://github.com/59-Projects/studio-pages/releases"
studio_repo_url: "https://github.com/59-Projects/studio"

exclude:
  - README.md
  - RELEASING.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - yarn.lock
  - node_modules
  - tailwind.config.js
  - postcss.config.js
  - src
  - .ruby-version
